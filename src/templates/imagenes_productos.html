<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imagenes</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <div class="container">

    <nav class="nav-tabs">
      <a href="/productos" class="nav-btn">Productos MySQL</a>
      <a href="/imagenes_productos" class="nav-btn active">Imagenes Mongo</a>
      <a href="/productos_completos" class="nav-btn">Datos unidos</a>
    </nav>

    <div class="card">
      <div class="card-header">Registros de imagenes</div>
      <div class="card-body">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th class="text-center">#</th>
                <th>Mongo ID</th>
                <th>Producto</th>
                <th class="text-center">Imagen</th>
                <th>Descripcion</th>
              </tr>
            </thead>
            <tbody>
              {% for i in data2 %}
              <tr>
                <td class="text-center cell-id">{{ loop.index }}</td>
                <td><span class="badge badge-mono">{{ i._id }}</span></td>
                <td class="cell-name">{{ i.producto }}</td>
                <td class="text-center">
                  <img src="{{ i.url }}" alt="Imagen producto" class="img-thumbnail">
                </td>
                <td>{{ i.descripcion }}</td>
              </tr>
              {% else %}
              <tr>
                <td colspan="5">
                  <div class="empty-state">
                    <p>No hay imagenes registradas</p>
                  </div>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
