<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Productos</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <div class="container">

    <nav class="nav-tabs">
      <a href="/productos" class="nav-btn active">Productos MySQL</a>
      <a href="/imagenes_productos" class="nav-btn">Imagenes Mongo</a>
      <a href="/productos_completos" class="nav-btn">Datos unidos</a>
    </nav>

    <div class="card">
      <div class="card-header">Lista de Productos</div>
      <div class="card-body">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th class="text-center">#</th>
                <th>Producto</th>
                <th>Marca</th>
                <th class="text-center">Precio</th>
              </tr>
            </thead>
            <tbody>
              {% for i in data %}
              <tr>
                <td class="text-center cell-id">{{ i.idproducto }}</td>
                <td class="cell-name">{{ i.producto }}</td>
                <td><span class="badge badge-default">{{ i.marca }}</span></td>
                <td class="text-center cell-price">$ {{ i.precio }}</td>
              </tr>
              {% else %}
              <tr>
                <td colspan="4">
                  <div class="empty-state">
                    <p>No hay productos registrados</p>
                  </div>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
